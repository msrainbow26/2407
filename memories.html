<!DOCTYPE html>
<html>
<head>
    <title>Our Memories 💙</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .memory-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #cfe9ff, #e8f4ff);
        }

        video, img {
            max-width: 80%;
            max-height: 70%;
            border-radius: 25px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(33,158,188,0.25);
        }

        /* 🔽 NEW: Gallery Styles */
        .gallery {
            padding: 40px 20px;
            background: #f7fbff;
        }

        .gallery h2 {
            text-align: center;
            color: #219ebc;
            margin-bottom: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .gallery-grid img,
        .gallery-grid video {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: static;
            transform: none;
        }

        .love-message {
            position: absolute;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ff5fa2;
            text-shadow: 0 0 5px #fff;
            animation: floatMessage 10s linear infinite;
        }

        @keyframes floatMessage {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="memories.html">Memories</a>
    <div id="nav-line"></div>
</nav>

<!-- 🔝 Featured Display -->
<div class="memory-container" id="memoryContainer"></div>

<!-- 🔽 NEW: Gallery Section -->
<div class="gallery">
    <h2>Our Full Gallery 💙</h2>
    <div class="gallery-grid" id="galleryGrid"></div>
</div>

<script src="nav.js"></script>
<script>
const container = document.getElementById("memoryContainer");
const galleryGrid = document.getElementById("galleryGrid");

// Media list (🔽 ADD MORE HERE anytime)
const mediaFiles = [
    {type: "video", src: "memories/vid1.mp4"},
    {type: "img", src: "memories/pic1.jpeg"},
    {type: "video", src: "memories/vid2.mp4"},
    {type: "img", src: "memories/pic2.jpeg"},
    {type: "img", src: "memories/pic3.jpeg"},
    {type: "video", src: "memories/vid3.mp4"},
    {type: "video", src: "memories/vid4.mp4"},
    {type: "video", src: "memories/vid5.mp4"},
    {type: "video", src: "memories/vid6.mp4"},
    {type: "video", src: "memories/vid7.mp4"},

    // 🔽 PLACEHOLDERS (just replace src later)
    {type: "img", src: "memories/placeholder1.jpg"},
    {type: "video", src: "memories/placeholder2.mp4"},
];

const messages = [
    "You are mine 💙",
    "Forever my husband 😏",
    "Every moment with you is magic ✨",
    "My heart beats for you 💓",
    "You complete me 💞",
    "Together, always 🥰"
];

let currentIndex = 0;

// 🔝 Featured loop display
function showMedia() {
    container.innerHTML = "";
    const media = mediaFiles[currentIndex];
    let element;

    if(media.type === "img"){
        element = document.createElement("img");
        element.src = media.src;
        container.appendChild(element);

        currentIndex = (currentIndex + 1) % mediaFiles.length;
        setTimeout(showMedia, 8000);

    } else {
        element = document.createElement("video");
        element.src = media.src;
        element.autoplay = true;
        element.muted = true;

        container.appendChild(element);

        element.onended = () => {
            currentIndex = (currentIndex + 1) % mediaFiles.length;
            showMedia();
        };
    }
}

// 🔽 NEW: Populate gallery
function loadGallery() {
    mediaFiles.forEach(media => {
        let el;

        if(media.type === "img"){
            el = document.createElement("img");
            el.src = media.src;
        } else {
            el = document.createElement("video");
            el.src = media.src;
            el.controls = true;
        }

        galleryGrid.appendChild(el);
    });
}

// Start everything
showMedia();
loadGallery();

// Floating messages
function spawnMessage() {
    const msg = document.createElement("div");
    msg.className = "love-message";
    msg.style.left = Math.random() * 80 + "%";
    msg.style.fontSize = (14 + Math.random()*12) + "px";
    msg.innerText = messages[Math.floor(Math.random() * messages.length)];
    container.appendChild(msg);

    setTimeout(() => container.removeChild(msg), 10000);
}

setInterval(spawnMessage, 2000);
</script>

</body>
</html>
